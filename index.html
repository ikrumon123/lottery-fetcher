<script>
const API_KEY = "1234";
const HMAC_SECRET = "1234";

const LATEST_API = "https://lottery-api.ikrupp.workers.dev/latest";
const HISTORY_API = "https://lottery-api.ikrupp.workers.dev/history";

let latestDrawDate = "";
let historyItems = [];

// 🔐 Generate HMAC (FIXED encoding)
async function generateSignature(secret, message) {
    const enc = new TextEncoder();

    const key = await crypto.subtle.importKey(
        "raw",
        enc.encode(secret),
        { name: "HMAC", hash: "SHA-256" },
        false,
        ["sign"]
    );

    const sig = await crypto.subtle.sign("HMAC", key, enc.encode(message));

    // ✅ FIX: proper base64
    return btoa(String.fromCharCode(...new Uint8Array(sig)));
}

// 🔥 Secure Fetch (clean + correct)
async function secureFetch(url) {
    const timestamp = Date.now().toString();
    const nonce = crypto.randomUUID();

    const body = ""; // GET → empty

    const message = timestamp + nonce + body;

    const signature = await generateSignature(HMAC_SECRET, message);

    const res = await fetch(url, {
        method: "GET",
        headers: {
            "x-api-key": API_KEY,
            "x-signature": signature,
            "x-timestamp": timestamp,
            "x-nonce": nonce
        }
    });

    if (!res.ok) {
        throw new Error("HTTP " + res.status);
    }

    return res.json();
}

// 🚀 INIT
async function init() {
    try {
        const latestData = await secureFetch(LATEST_API);
        latestDrawDate = latestData.draw_date;
        renderLatest(latestData);

        const historyJson = await secureFetch(HISTORY_API);

        historyItems = (historyJson.items || []).filter(
            item => item.draw_date !== latestDrawDate
        );

        renderHistoryList();

    } catch (e) {
        console.error("API Error:", e);
        document.querySelectorAll('.loading')
            .forEach(el => el.innerText = "Error connecting to server.");
    }
}

// --- YOUR UI CODE (unchanged below) ---

function renderLatest(draw) {
    document.getElementById('latest-display').innerHTML = buildResultHTML(draw, true);
}

function buildResultHTML(draw, isLatest) {
    const p = draw.prizes;
    const categories = ["1st","consolation","2nd","3rd","4th","5th","6th","7th","8th","9th"];

    const firstTicket = isLatest ? (draw.first ? draw.first.ticket : "") : draw.first_ticket;

    let rows = "";
    categories.forEach(cat => {
        let nums = (cat === "1st") ? [firstTicket] : (cat === "consolation" ? p.consolation : p[cat]) || [];

        let numHtml = nums.length > 0
            ? `<div class="ticket-wrap">${nums.map(n => `<span class="t-badge ${cat==='1st'?'t-1st':''}">${n}</span>`).join('')}</div>`
            : `<span style="color:#999;">Processing...</span>`;

        rows += `<tr>
            <td style="font-weight:bold;">${cat==='consolation'?'CONSOLATION':cat.toUpperCase()+" PRIZE"}</td>
            <td>${numHtml}</td>
            <td style="color:green;">${p.amounts[cat] || '--'}</td>
        </tr>`;
    });

    return `
        <div class="result-header">
            ${isLatest ? '<div class="live-tag">LATEST</div>' : ''}
            <h1>${draw.draw_name}</h1>
            <p>${draw.draw_date} | ${draw.draw_code}</p>
        </div>
        <table class="prize-table">
            <thead><tr><th>Prize</th><th>Numbers</th><th>Amount</th></tr></thead>
            <tbody>${rows}</tbody>
        </table>`;
}

function renderHistoryList() {
    const list = document.getElementById('history-list');

    if (!historyItems.length) {
        list.innerHTML = "No results";
        return;
    }

    list.innerHTML = historyItems.map((d,i)=>`
        <div class="history-card" onclick="showHistoryDetail(${i})">
            <div>
                <div>${d.draw_date}</div>
                <div>${d.draw_name}</div>
            </div>
        </div>
    `).join('');
}

function showHistoryDetail(i) {
    const d = historyItems[i];
    document.getElementById('history-detail').innerHTML = buildResultHTML(d,false);
}

function switchTab(id) {
    document.querySelectorAll('.content-section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

init();
</script>
