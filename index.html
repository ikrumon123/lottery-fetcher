<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHDTVMAX | Kerala Lottery Portal</title>

<style>
:root { --primary:#e63946; --dark:#1d3557; --success:#2d6a4f; --bg:#f0f2f5; }
body { font-family:Segoe UI; background:var(--bg); margin:0; padding:10px; }
.container { max-width:1000px; margin:auto; }

.tabs { display:flex; gap:10px; margin-bottom:20px; background:white; padding:10px; border-radius:12px; }
.tab-btn { flex:1; padding:12px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; }
.tab-btn.active { background:var(--primary); color:white; }

.content-section { display:none; }
.content-section.active { display:block; }

.loading { text-align:center; padding:50px; color:var(--primary); }

.prize-table { width:100%; border-collapse:collapse; background:white; border-radius:12px; overflow:hidden; }
.prize-table th { background:var(--dark); color:white; padding:12px; }
.prize-table td { padding:10px; border-bottom:1px solid #eee; }

.ticket-wrap { display:flex; flex-wrap:wrap; gap:5px; }
.t-badge { padding:3px 6px; border:1px solid #ddd; border-radius:5px; font-family:monospace; }
.t-1st { background:#fff3f3; color:var(--primary); }

.history-card { background:white; padding:15px; margin-bottom:10px; cursor:pointer; }
</style>
</head>

<body>

<div class="container">

<div class="tabs">
<button class="tab-btn active" onclick="switchTab('latest')">LATEST</button>
<button class="tab-btn" onclick="switchTab('history')">HISTORY</button>
</div>

<div id="latest" class="content-section active">
<div id="latest-display"><div class="loading">Loading...</div></div>
</div>

<div id="history" class="content-section">
<div id="history-list"><div class="loading">Loading...</div></div>
</div>

</div>

<script>
const API_KEY = "1234";
const HMAC_SECRET = "1234";

const LATEST_API = "https://lottery-api.ikrupp.workers.dev/latest";
const HISTORY_API = "https://lottery-api.ikrupp.workers.dev/history";

let etagCache = {};
let latestDrawDate = "";
let historyItems = [];

// 🔐 HMAC
async function generateSignature(secret, message){
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey(
    "raw", enc.encode(secret),
    { name:"HMAC", hash:"SHA-256" },
    false, ["sign"]
  );

  const sig = await crypto.subtle.sign("HMAC", key, enc.encode(message));
  return btoa(String.fromCharCode(...new Uint8Array(sig)));
}

// 🔥 SECURE FETCH WITH 304 SUPPORT
async function secureFetch(url){
  const timestamp = Date.now().toString();
  const nonce = crypto.randomUUID();
  const body = "";

  const message = timestamp + nonce + body;
  const signature = await generateSignature(HMAC_SECRET, message);

  const headers = {
    "x-api-key": API_KEY,
    "x-signature": signature,
    "x-timestamp": timestamp,
    "x-nonce": nonce
  };

  // send etag
  if(etagCache[url]){
    headers["If-None-Match"] = etagCache[url];
  }

  const res = await fetch(url, { headers });

  // 304 handling
  if(res.status === 304){
    return JSON.parse(localStorage.getItem(url));
  }

  const etag = res.headers.get("ETag");
  if(etag){
    etagCache[url] = etag;
  }

  const data = await res.json();
  localStorage.setItem(url, JSON.stringify(data));

  return data;
}

// 🚀 INIT
async function init(){
  try{
    const latest = await secureFetch(LATEST_API);
    latestDrawDate = latest.draw_date;
    renderLatest(latest);

    const history = await secureFetch(HISTORY_API);
    historyItems = (history.items || []).filter(x=>x.draw_date!==latestDrawDate);

    renderHistory();

  }catch(e){
    console.error(e);
    document.querySelectorAll(".loading").forEach(x=>x.innerText="Error loading");
  }
}

// UI
function renderLatest(d){
  document.getElementById("latest-display").innerHTML = build(d,true);
}

function renderHistory(){
  const el = document.getElementById("history-list");
  el.innerHTML = historyItems.map((d,i)=>`
    <div class="history-card" onclick="showHistory(${i})">
      ${d.draw_date} - ${d.draw_name}
    </div>
  `).join("");
}

function showHistory(i){
  document.getElementById("history-list").innerHTML = build(historyItems[i],false);
}

function build(draw,isLatest){
  const p = draw.prizes;
  const first = isLatest ? draw.first?.ticket : draw.first_ticket;

  const cats=["1st","consolation","2nd","3rd","4th","5th","6th","7th","8th","9th"];

  let rows="";
  cats.forEach(c=>{
    let nums = c==="1st" ? [first] : (c==="consolation"?p.consolation:p[c])||[];

    rows+=`
    <tr>
      <td>${c}</td>
      <td><div class="ticket-wrap">${nums.map(n=>`<span class="t-badge">${n}</span>`).join("")}</div></td>
      <td>${p.amounts[c]||"--"}</td>
    </tr>`;
  });

  return `
  <h2>${draw.draw_name}</h2>
  <p>${draw.draw_date}</p>
  <table class="prize-table">
    <thead><tr><th>Prize</th><th>Numbers</th><th>Amount</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function switchTab(id){
  document.querySelectorAll(".content-section").forEach(x=>x.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

init();
</script>

</body>
</html>
